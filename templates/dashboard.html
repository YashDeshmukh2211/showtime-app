<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <style>
        body {
            background: #0a0a0f;
            color: white;
            font-family: 'DM Sans';
            padding: 30px;
        }

        .card {
            background: #1a1a24;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

<h1>🎟️ My Bookings</h1>

{% for b in bookings %}
<div class="card">
    <h3>{{ b.movie }}</h3>
    <p>{{ b.show_time }}</p>
    <p>{{ b.seats }}</p>
</div>
{% endfor %}

<a href="/">← Back</a>

</body>
</html>
