<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body {
            background: #0a0a0f;
            color: white;
            font-family: 'DM Sans', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: #1a1a24;
            padding: 30px;
            border-radius: 12px;
            width: 300px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #121218;
            border: 1px solid #333;
            color: white;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #f84464;
            border: none;
            color: white;
            cursor: pointer;
        }

        a {
            color: #f84464;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>
    <form method="POST">
        <input name="email" placeholder="Email" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
    <p><a href="/signup">Create Account</a></p>
</div>

</body>
</html>
